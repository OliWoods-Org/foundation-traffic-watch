openapi: 3.1.0
info:
  title: foundation-traffic-watch API
  version: 0.3.0
  description: Human trafficking detection and survivor support API
servers:
  - url: http://localhost:3847
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /api/v1/ads/analyze:
    post:
      summary: Analyze classified ad for trafficking indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Risk analysis result
  /api/v1/safety/plan:
    post:
      summary: Generate survivor safety plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Safety plan
  /api/v1/tips/triage:
    post:
      summary: Triage anonymous tip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Triaged tip